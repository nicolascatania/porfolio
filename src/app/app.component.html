<div *ngIf="isLoading" class="app-preloader fixed inset-0 flex items-center justify-center bg-white dark:bg-gray-900 transition-colors duration-300 z-50" aria-label="Loading portfolio">
  <div class="text-center px-4">
    <div class="preloader-logo mx-auto mb-5 flex h-20 w-20 items-center justify-center rounded-full border border-slate-300 bg-slate-100 text-3xl font-bold text-slate-900 dark:border-gray-600 dark:bg-gray-800 dark:text-white">
      NC
    </div>
    <p class="text-base font-semibold text-slate-700 dark:text-slate-200 mb-5">Cargando portfolio...</p>
    <div class="w-72 max-w-full overflow-hidden rounded-full bg-slate-200 dark:bg-gray-700 h-3">
      <div class="progress-bar h-full bg-primaryBlue transition-all duration-300" [style.width.%]="progress"></div>
    </div>
  </div>
</div>

<div *ngIf="!isLoading" class="bg-white dark:bg-gray-800 min-h-screen transition-colors duration-300" [class.dark]="darkModeService.darkModeSignal()">
    <app-nav-bar></app-nav-bar>
    <app-hero></app-hero>
    <app-experience></app-experience>
    <app-projects></app-projects>
    <app-tech-stack></app-tech-stack>
    <app-education></app-education>
    <app-about-me></app-about-me>
    <app-footer></app-footer>
</div>
